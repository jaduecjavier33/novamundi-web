<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NOVAMUNDI — AI Visual Content Studio</title>
  <meta name="description" content="NOVAMUNDI convierte marcas en experiencias visuales que se sienten, se recuerdan y se desean." />

  <style>
     :root {
      --bg: #FAF9F7;
      --ink: #101820;
      --purple: #4D1E8F;

      /* Mockup fijo tipo iPhone: no depende del contenido interno. */
      --phone-w: 350px;
      --phone-h: 758px;
      --phone-radius: 48px;
      --screen-radius: 40px;
      --frame: #111319;
      --frame-2: #2A2D35;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      overflow: hidden;
      font-family: Inter, Sora, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: var(--bg);
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      position: relative;
    }

    .background-layer {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
      background: #FAF9F7;
      isolation: isolate;
    }

    .bg-base {
      position: absolute;
      inset: 0;
      z-index: 0;
      background:
        linear-gradient(135deg, rgba(250,249,247,.20), rgba(242,238,249,.24)),
        url("assets/fondo-base-desktop.jpg") center center / cover no-repeat;
      transform: scale(1.02);
    }

    .bg-video-mount,
    .bg-water-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .bg-video-mount {
      z-index: 1;
    }

    .bg-water-video {
      object-fit: cover;
      opacity: .58;
      filter: blur(.35px) saturate(1.06) contrast(1.03);
      mix-blend-mode: normal;
      transform: scale(1.025);
    }

    .bg-video-overlay {
      position: absolute;
      inset: 0;
      z-index: 2;
      background:
        radial-gradient(circle at 22% 25%, rgba(77,30,143,.14), transparent 35%),
        radial-gradient(circle at 78% 72%, rgba(255,255,255,.26), transparent 38%),
        linear-gradient(135deg, rgba(250,249,247,.22) 0%, rgba(242,238,249,.24) 100%);
    }

    .ambient {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      overflow: hidden;
      background:
        radial-gradient(circle at 18% 24%, rgba(77, 30, 143, .08), transparent 34%),
        radial-gradient(circle at 82% 72%, rgba(16, 24, 32, .035), transparent 38%);
    }

    @media (max-width: 768px) {
      .bg-video-mount {
        display: none;
      }

      .bg-base {
        background:
          radial-gradient(circle at 18% 24%, rgba(77,30,143,.11), transparent 34%),
          radial-gradient(circle at 82% 72%, rgba(255,255,255,.22), transparent 38%),
          url("assets/fondo-base-desktop.jpg") center center / cover no-repeat;
      }

      .bg-video-overlay {
        background: linear-gradient(135deg, rgba(250,249,247,.34), rgba(242,238,249,.44));
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .bg-water-video {
        display: none;
      }
    }

    .brand {
      position: fixed;
      top: clamp(22px, 4vh, 42px);
      left: clamp(26px, 6vw, 80px);
      z-index: 10;
      user-select: none;
    }

    .brand-logo {
      display: block;
      width: clamp(145px, 15vw, 230px);
      height: auto;
      object-fit: contain;
    }

    .brand-fallback {
      display: none;
      font-weight: 800;
      letter-spacing: .12em;
      font-size: clamp(18px, 2vw, 26px);
    }

    .nova { color: var(--ink); }
    .mundi { color: var(--purple); }

    .stage {
      position: relative;
      z-index: 3;
      width: var(--phone-w);
      height: var(--phone-h);
      display: grid;
      place-items: center;
    }

    .phone {
      position: relative;
      width: 100%;
      height: 100%;
      padding: 7px;
      border-radius: var(--phone-radius);
      border: 1px solid rgba(255,255,255,.20);
      background:
        linear-gradient(145deg, rgba(255,255,255,.14), rgba(255,255,255,.035) 17%, transparent 38%),
        linear-gradient(145deg, var(--frame-2), var(--frame) 48%, #07080C);
      box-shadow:
        0 38px 100px rgba(16, 24, 32, .28),
        inset 0 0 0 1px rgba(255,255,255,.08),
        inset 0 -18px 34px rgba(0,0,0,.32);
    }

    .phone::before {
      content: "";
      position: absolute;
      top: 8px;
      left: 50%;
      transform: translateX(-50%);
      width: 104px;
      height: 29px;
      border-radius: 0 0 22px 22px;
      background: rgba(3, 4, 8, .97);
      z-index: 70;
      pointer-events: none;
      box-shadow: 0 8px 20px rgba(0,0,0,.22);
    }

    .phone::after {
      content: "";
      position: absolute;
      inset: 7px;
      border-radius: var(--screen-radius);
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,.065),
        inset 0 0 30px rgba(0,0,0,.22);
      pointer-events: none;
      z-index: 68;
    }

    .screen {
      position: relative;
      width: 100%;
      height: 100%;
      border-radius: var(--screen-radius);
      overflow-y: auto;
      overflow-x: hidden;
      scroll-snap-type: y mandatory;
      overscroll-behavior: contain;
      scrollbar-width: none;
      background: #090A0D;
      isolation: isolate;
    }

    .screen::-webkit-scrollbar { display: none; }

    .reel {
      position: relative;
      width: 100%;
      height: 100%;
      min-height: 100%;
      scroll-snap-align: start;
      scroll-snap-stop: always;
      overflow: hidden;
      background: #090A0D;
      isolation: isolate;
    }

    .reel video,
    .reel img {
      position: absolute;
      inset: 0;
      z-index: 1;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      background: #090A0D;
    }

    .reel::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      background:
        linear-gradient(to top, rgba(0,0,0,.18), transparent 38%, rgba(0,0,0,.08)),
        radial-gradient(circle at center, transparent 61%, rgba(0,0,0,.08));
    }

    .audio-toggle {
      position: absolute;
      top: 48px;
      right: 15px;
      z-index: 90;
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 999px;
      padding: 7px 10px;
      background: rgba(0, 0, 0, .34);
      backdrop-filter: blur(16px);
      color: rgba(255,255,255,.92);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 600;
      line-height: 1;
      letter-spacing: -.01em;
      box-shadow: 0 10px 24px rgba(0,0,0,.18);
      transition: background 160ms ease, transform 160ms ease, color 160ms ease, opacity 160ms ease;
    }

    .audio-toggle:hover { transform: translateY(-1px); background: rgba(0,0,0,.46); }
    .audio-toggle.is-on { background: rgba(255,255,255,.86); color: var(--ink); border-color: rgba(255,255,255,.70); }

    .actions {
      position: absolute;
      right: 14px;
      bottom: 70px;
      z-index: 45;
      display: grid;
      gap: 13px;
      color: #fff;
    }

    .action-stack {
      display: grid;
      gap: 4px;
      justify-items: center;
      font-size: 10px;
      font-weight: 800;
      color: rgba(255,255,255,.86);
      text-shadow: 0 3px 12px rgba(0,0,0,.35);
    }

    .action-btn {
      width: 43px;
      height: 43px;
      padding: 0;
      border: 0;
      border-radius: 999px;
      cursor: pointer;
      display: grid;
      place-items: center;
      color: #fff;
      background: rgba(255,255,255,.16);
      backdrop-filter: blur(16px);
      box-shadow: 0 10px 24px rgba(0,0,0,.18);
      transition: transform 150ms ease, background 150ms ease, color 150ms ease;
    }

    .action-btn:hover { transform: translateY(-1px); background: rgba(255,255,255,.22); }
    .action-btn.active { background: rgba(255,255,255,.94); color: var(--purple); }
    .action-icon { width: 21px; height: 21px; }

    .progress {
      position: absolute;
      right: 9px;
      top: 50%;
      transform: translateY(-50%);
      z-index: 44;
      display: grid;
      gap: 8px;
      pointer-events: none;
    }

    .dot { width: 4px; height: 19px; border-radius: 999px; background: rgba(255,255,255,.26); transition: height 200ms ease, background 200ms ease; }
    .dot.active { height: 34px; background: rgba(255,255,255,.88); }

    .ad-reel {
      display: grid;
      place-items: center;
      padding: 22px;
      background:
        radial-gradient(circle at 30% 20%, rgba(77,30,143,.55), transparent 36%),
        radial-gradient(circle at 78% 82%, rgba(255,255,255,.14), transparent 34%),
        linear-gradient(145deg, #0B0D12 0%, #171027 58%, #101820 100%);
    }

    .ad-reel::before {
      content: "";
      position: absolute;
      inset: -25%;
      z-index: 1;
      background:
        radial-gradient(circle at 28% 35%, rgba(116,65,190,.55), transparent 26%),
        radial-gradient(circle at 70% 52%, rgba(255,255,255,.12), transparent 22%),
        radial-gradient(circle at 44% 76%, rgba(77,30,143,.48), transparent 28%),
        conic-gradient(from 160deg at 50% 50%, rgba(77,30,143,.55), rgba(16,24,32,.18), rgba(110,70,190,.45), rgba(77,30,143,.55));
      filter: blur(26px);
      opacity: .78;
      animation: liquid 10s ease-in-out infinite alternate;
    }

    @keyframes liquid {
      0% { transform: translate3d(-2%, -1%, 0) rotate(0deg) scale(1); }
      50% { transform: translate3d(2%, 2%, 0) rotate(9deg) scale(1.05); }
      100% { transform: translate3d(-1%, 2%, 0) rotate(-7deg) scale(1.02); }
    }

    .ad-reel::after { background: radial-gradient(circle at 50% 30%, rgba(255,255,255,.08), transparent 26%), linear-gradient(to top, rgba(0,0,0,.34), transparent 58%); z-index: 2; }

    .ad-card {
      position: relative;
      z-index: 10;
      width: 100%;
      padding: 22px;
      border-radius: 30px;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.10);
      backdrop-filter: blur(18px);
      color: #fff;
      box-shadow: 0 28px 90px rgba(0,0,0,.25);
    }

    .ad-label {
      display: inline-flex;
      margin-bottom: 16px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,.12);
      color: rgba(255,255,255,.78);
      font-size: 10px;
      font-weight: 900;
      letter-spacing: .14em;
      text-transform: uppercase;
    }

    .ad-card h2 {
      margin: 0 0 10px;
      max-width: 260px;
      font-size: 24px;
      line-height: .96;
      letter-spacing: -.055em;
    }

    .ad-card p {
      margin: 0 0 18px;
      color: rgba(255,255,255,.76);
      font-size: 13px;
      line-height: 1.36;
    }

    .ad-actions { display: grid; gap: 10px; }

    .ad-button,
    .ad-secondary {
      min-height: 44px;
      width: 100%;
      border: 0;
      border-radius: 999px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: -.01em;
      line-height: 1;
      white-space: nowrap;
      text-align: center;
      transition: transform 150ms ease;
    }

    .ad-button { color: #101820; background: #fff; gap: 7px; padding: 0 18px; justify-content: center; }
    .ad-secondary { color: rgba(255,255,255,.86); background: rgba(255,255,255,.12); }
    .ad-button:hover, .ad-secondary:hover { transform: translateY(-1px); }

    .wa-mini {
      width: 18px;
      height: 18px;
      flex: 0 0 auto;
      display: inline-block;
    }

    .timed-ad {
      position: absolute;
      left: 14px;
      right: 14px;
      bottom: 18px;
      z-index: 90;
      opacity: 0;
      transform: translateY(14px) scale(.98);
      pointer-events: none;
      transition: opacity 220ms ease, transform 220ms ease;
    }

    .timed-ad.visible { opacity: 1; transform: translateY(0) scale(1); pointer-events: auto; }

    .timed-ad-card {
      position: relative;
      overflow: hidden;
      border-radius: 24px;
      padding: 16px;
      color: #fff;
      border: 1px solid rgba(255,255,255,.16);
      background: rgba(19, 14, 34, .84);
      backdrop-filter: blur(18px);
      box-shadow: 0 18px 50px rgba(0,0,0,.32);
    }

    .timed-ad-card::before {
      content: "";
      position: absolute;
      inset: -55%;
      z-index: 0;
      background:
        radial-gradient(circle at 24% 40%, rgba(122,70,210,.62), transparent 27%),
        radial-gradient(circle at 78% 60%, rgba(255,255,255,.14), transparent 22%),
        conic-gradient(from 90deg, rgba(77,30,143,.65), rgba(16,24,32,.18), rgba(122,70,210,.52), rgba(77,30,143,.65));
      filter: blur(24px);
      animation: liquid 11s ease-in-out infinite alternate;
    }

    .timed-ad-content { position: relative; z-index: 1; }
    .timed-ad h3 { margin: 0 0 6px; font-size: 19px; line-height: 1; letter-spacing: -.04em; }
    .timed-ad p { margin: 0 0 12px; color: rgba(255,255,255,.76); font-size: 12px; line-height: 1.35; }
    .timed-ad-actions { display: flex; gap: 8px; }

    .timed-ad-actions a,
    .timed-ad-actions button {
      flex: 1;
      min-height: 38px;
      border: 0;
      border-radius: 999px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      text-decoration: none;
      font-size: 9px;
      font-weight: 800;
      white-space: nowrap;
    }

    .timed-ad-actions a { color: #101820; background: #fff; }
    .timed-ad-actions button { color: rgba(255,255,255,.84); background: rgba(255,255,255,.12); }

    .floating-whatsapp {
      position: fixed;
      right: clamp(18px, 3vw, 34px);
      bottom: clamp(18px, 3vw, 34px);
      z-index: 80;
      border: 0;
      border-radius: 999px;
      padding: 13px 17px;
      text-decoration: none;
      background: #25D366;
      color: #08140d;
      font-size: 13px;
      font-weight: 900;
      display: flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 18px 54px rgba(37, 211, 102, .28);
      opacity: 0;
      transform: translateY(12px);
      pointer-events: none;
      transition: opacity 220ms ease, transform 220ms ease;
    }

    .floating-whatsapp.visible { opacity: 1; transform: translateY(0); pointer-events: auto; }

    @media (max-width: 920px) {
      :root {
        --phone-w: min(350px, 88vw);
        --phone-h: min(758px, calc(88vw * 758 / 350), 82vh);
      }

      .brand {
        left: 50%;
        top: 18px;
        transform: translateX(-50%);
      }

      .brand-logo {
        width: 170px;
      }
    }

    @media (max-height: 760px) {
      :root {
        --phone-h: min(720px, 82vh);
        --phone-w: calc(var(--phone-h) * 350 / 758);
      }
    }


    /* Ajuste desktop: da más aire al CTA del anuncio temporizado sin afectar mobile. */
    @media (min-width: 769px) {
      .timed-ad-actions {
        gap: 9px;
      }

      .timed-ad-actions a.js-whatsapp {
        flex: 1.45;
        min-width: 0;
        padding: 0 15px;
        justify-content: center;
      }

      .timed-ad-actions button {
        flex: .85;
        min-width: 0;
        padding: 0 12px;
      }
    }

  </style>
</head>

<body>
  <div class="background-layer" aria-hidden="true">
    <div class="bg-base"></div>
    <div class="bg-video-mount" id="backgroundVideoMount"></div>
    <div class="bg-video-overlay"></div>
  </div>
  <div class="ambient" id="ambient"></div>

  <header class="brand" aria-label="NOVAMUNDI">
    <img class="brand-logo" src="assets/logo-novamundi.png" alt="NOVAMUNDI" onerror="this.style.display='none'; this.nextElementSibling.style.display='inline-block';" />
    <span class="brand-fallback"><span class="nova">NOVA</span><span class="mundi">MUNDI</span></span>
  </header>

  <main class="stage">
    <section class="phone" aria-label="Celular con portfolio NovaMundi">
      <button class="audio-toggle" id="audioToggle" type="button" aria-label="Activar o desactivar audio">
        <span id="audioIcon">🔇</span>
        <span id="audioText">Audio</span>

      <div class="screen" id="screen">

        <div class="timed-ad" id="timedAd">
          <div class="timed-ad-card">
            <div class="timed-ad-content">
              <h3>Tu marca también puede sentirse así.</h3>
              <p>Pensemos juntos tu próximo contenido visual.</p>

                <a class="js-whatsapp" target="_blank" rel="noopener">
                  <svg class="wa-mini" viewBox="0 0 32 32" aria-hidden="true"><path fill="currentColor" d="M16.02 3.2A12.68 12.68 0 0 0 5.1 22.36L3.8 28.8l6.6-1.74a12.7 12.7 0 1 0 5.62-23.86Zm0 22.99c-2.02 0-3.9-.6-5.48-1.64l-.39-.25-3.9 1.03 1.04-3.8-.26-.4A10.26 10.26 0 1 1 16.02 26.2Zm5.82-7.7c-.32-.16-1.87-.92-2.16-1.03-.29-.1-.5-.16-.71.16-.21.32-.82 1.03-1 1.24-.18.21-.37.24-.69.08-.32-.16-1.34-.49-2.55-1.56-.94-.84-1.58-1.88-1.76-2.2-.18-.32-.02-.49.14-.65.14-.14.32-.37.48-.55.16-.18.21-.32.32-.53.1-.21.05-.4-.03-.55-.08-.16-.71-1.72-.98-2.36-.26-.62-.52-.53-.71-.54h-.6c-.21 0-.55.08-.84.4-.29.32-1.1 1.08-1.1 2.62s1.13 3.04 1.29 3.25c.16.21 2.23 3.4 5.4 4.77.75.32 1.34.52 1.8.66.76.24 1.45.21 1.99.13.61-.09 1.87-.76 2.13-1.5.26-.74.26-1.37.18-1.5-.08-.13-.29-.21-.61-.37Z"/></svg>
                  WhatsApp
                </a>
                <button id="closeTimedAd" type="button">Cerrar</button>
              </div>
            </div>
          </div>
        </div>

        <article class="reel" data-theme="manifesto">
          <video src="assets/video-manifiesto.mp4" poster="assets/poster-manifiesto.jpg" muted playsinline loop preload="metadata"></video>
          <div class="actions">
            <div class="action-stack"><button class="action-btn js-like" type="button" aria-label="Like"><svg class="action-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78L12 21.23l8.84-8.84a5.5 5.5 0 0 0 0-7.78Z"/></svg></button><span>Like</span></div>
            <div class="action-stack"><button class="action-btn js-save" type="button" aria-label="Guardar"><svg class="action-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg></button><span>Guardar</span></div>
          </div>
        </article>

        <article class="reel" data-theme="auto">
          <video src="assets/video-quetaller.mp4" poster="assets/poster-quetaller.jpg" muted playsinline loop preload="metadata"></video>
          <div class="actions">
            <div class="action-stack"><button class="action-btn js-like" type="button" aria-label="Like"><svg class="action-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78L12 21.23l8.84-8.84a5.5 5.5 0 0 0 0-7.78Z"/></svg></button><span>Like</span></div>
            <div class="action-stack"><button class="action-btn js-save" type="button" aria-label="Guardar"><svg class="action-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg></button><span>Guardar</span></div>
          </div>
        </article>

        <article class="reel" data-theme="food">
          <video src="assets/video-empanada.mp4" poster="assets/poster-empanada.jpg" muted playsinline loop preload="metadata"></video>
          <div class="actions">
            <div class="action-stack"><button class="action-btn js-like" type="button" aria-label="Like"><svg class="action-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78L12 21.23l8.84-8.84a5.5 5.5 0 0 0 0-7.78Z"/></svg></button><span>Like</span></div>
            <div class="action-stack"><button class="action-btn js-save" type="button" aria-label="Guardar"><svg class="action-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg></button><span>Guardar</span></div>
          </div>
        </article>

        <article class="reel ad-reel" data-theme="agency">
          <div class="ad-card">
            <div class="ad-label">Anuncio / NOVAMUNDI</div>
            <h2>Tu marca también puede sentirse así.</h2>
            <p>Pensemos juntos tu próximo contenido visual.</p>
            <div class="ad-actions">
              <a class="ad-button js-whatsapp" target="_blank" rel="noopener">
                <svg class="wa-mini" viewBox="0 0 32 32" aria-hidden="true"><path fill="currentColor" d="M16.02 3.2A12.68 12.68 0 0 0 5.1 22.36L3.8 28.8l6.6-1.74a12.7 12.7 0 1 0 5.62-23.86Zm0 22.99c-2.02 0-3.9-.6-5.48-1.64l-.39-.25-3.9 1.03 1.04-3.8-.26-.4A10.26 10.26 0 1 1 16.02 26.2Zm5.82-7.7c-.32-.16-1.87-.92-2.16-1.03-.29-.1-.5-.16-.71.16-.21.32-.82 1.03-1 1.24-.18.21-.37.24-.69.08-.32-.16-1.34-.49-2.55-1.56-.94-.84-1.58-1.88-1.76-2.2-.18-.32-.02-.49.14-.65.14-.14.32-.37.48-.55.16-.18.21-.32.32-.53.1-.21.05-.4-.03-.55-.08-.16-.71-1.72-.98-2.36-.26-.62-.52-.53-.71-.54h-.6c-.21 0-.55.08-.84.4-.29.32-1.1 1.08-1.1 2.62s1.13 3.04 1.29 3.25c.16.21 2.23 3.4 5.4 4.77.75.32 1.34.52 1.8.66.76.24 1.45.21 1.99.13.61-.09 1.87-.76 2.13-1.5.26-.74.26-1.37.18-1.5-.08-.13-.29-.21-.61-.37Z"/></svg>
                Cotizar
              </a>
              <button class="ad-secondary" id="closeAd" type="button">Seguir viendo</button>
            </div>
          </div>
        </article>

        <nav class="progress" id="progress" aria-hidden="true"></nav>
      </div>
    </section>
  </main>

  <a class="floating-whatsapp js-whatsapp" id="floatingWhatsapp" target="_blank" rel="noopener">
    <svg class="wa-mini" viewBox="0 0 32 32" aria-hidden="true"><path fill="currentColor" d="M16.02 3.2A12.68 12.68 0 0 0 5.1 22.36L3.8 28.8l6.6-1.74a12.7 12.7 0 1 0 5.62-23.86Zm0 22.99c-2.02 0-3.9-.6-5.48-1.64l-.39-.25-3.9 1.03 1.04-3.8-.26-.4A10.26 10.26 0 1 1 16.02 26.2Zm5.82-7.7c-.32-.16-1.87-.92-2.16-1.03-.29-.1-.5-.16-.71.16-.21.32-.82 1.03-1 1.24-.18.21-.37.24-.69.08-.32-.16-1.34-.49-2.55-1.56-.94-.84-1.58-1.88-1.76-2.2-.18-.32-.02-.49.14-.65.14-.14.32-.37.48-.55.16-.18.21-.32.32-.53.1-.21.05-.4-.03-.55-.08-.16-.71-1.72-.98-2.36-.26-.62-.52-.53-.71-.54h-.6c-.21 0-.55.08-.84.4-.29.32-1.1 1.08-1.1 2.62s1.13 3.04 1.29 3.25c.16.21 2.23 3.4 5.4 4.77.75.32 1.34.52 1.8.66.76.24 1.45.21 1.99.13.61-.09 1.87-.76 2.13-1.5.26-.74.26-1.37.18-1.5-.08-.13-.29-.21-.61-.37Z"/></svg>
    <span>WhatsApp</span>
    <span>→</span>
  </a>

  <script>

    const DESKTOP_BG_QUERY = window.matchMedia("(min-width: 769px)");
    const BG_VIDEO_SRC = "assets/fondo-agua-desktop.mp4";
    const BG_POSTER_SRC = "assets/fondo-base-desktop.jpg";
    const backgroundVideoMount = document.getElementById("backgroundVideoMount");
    let backgroundVideo = null;

    function loadDesktopBackgroundVideo() {
      if (!backgroundVideoMount) return;

      if (!DESKTOP_BG_QUERY.matches) {
        if (backgroundVideo) {
          backgroundVideo.pause();
          backgroundVideo.remove();
          backgroundVideo = null;
        }
        return;
      }

      if (backgroundVideo) return;

      const video = document.createElement("video");
      video.className = "bg-water-video";
      video.autoplay = true;
      video.muted = true;
      video.defaultMuted = true;
      video.loop = true;
      video.playsInline = true;
      video.preload = "auto";
      video.poster = BG_POSTER_SRC;
      video.setAttribute("autoplay", "");
      video.setAttribute("muted", "");
      video.setAttribute("loop", "");
      video.setAttribute("playsinline", "");
      video.setAttribute("aria-hidden", "true");
      video.disablePictureInPicture = true;

      const source = document.createElement("source");
      source.src = BG_VIDEO_SRC;
      source.type = "video/mp4";
      video.appendChild(source);

      backgroundVideoMount.appendChild(video);
      backgroundVideo = video;
      video.load();
      video.addEventListener("canplay", () => video.play().catch(() => {}), { once: true });
      video.play().catch(() => {});
    }

    loadDesktopBackgroundVideo();

    if (DESKTOP_BG_QUERY.addEventListener) {
      DESKTOP_BG_QUERY.addEventListener("change", loadDesktopBackgroundVideo);
    } else if (DESKTOP_BG_QUERY.addListener) {
      DESKTOP_BG_QUERY.addListener(loadDesktopBackgroundVideo);
    }


    const WHATSAPP_NUMBER = "56984781793";
    const WHATSAPP_MESSAGE = "Hola NOVAMUNDI, quiero cotizar contenido visual para mi marca.";
    const TIMED_AD_DELAY_MS = 15000;

    const themes = {
      manifesto: { background: "radial-gradient(circle at 25% 30%, rgba(77,30,143,.16), transparent 34%), radial-gradient(circle at 78% 72%, rgba(16,24,32,.08), transparent 36%), linear-gradient(135deg, #FAF9F7 0%, #F2EEF9 100%)" },
      auto: { background: "radial-gradient(circle at 18% 24%, rgba(16,24,32,.12), transparent 34%), radial-gradient(circle at 84% 74%, rgba(150,160,175,.28), transparent 38%), linear-gradient(135deg, #FAF9F7 0%, #F1F3F5 100%)" },
      food: { background: "radial-gradient(circle at 20% 28%, rgba(255,186,73,.20), transparent 34%), radial-gradient(circle at 78% 72%, rgba(255,120,79,.14), transparent 36%), linear-gradient(135deg, #FAF9F7 0%, #FFF2DE 100%)" },
      agency: { background: "radial-gradient(circle at 22% 30%, rgba(16,24,32,.12), transparent 34%), radial-gradient(circle at 78% 70%, rgba(77,30,143,.18), transparent 36%), linear-gradient(135deg, #FAF9F7 0%, #F7F4FF 100%)" }
    };

    const screen = document.getElementById("screen");
    const ambient = document.getElementById("ambient");
    const audioToggle = document.getElementById("audioToggle");
    const audioIcon = document.getElementById("audioIcon");
    const audioText = document.getElementById("audioText");
    const progress = document.getElementById("progress");
    const closeAd = document.getElementById("closeAd");
    const floatingWhatsapp = document.getElementById("floatingWhatsapp");
    const timedAd = document.getElementById("timedAd");
    const closeTimedAd = document.getElementById("closeTimedAd");
    const reels = [...document.querySelectorAll(".reel")];
    const videos = [...document.querySelectorAll(".reel video")];
    let activeIndex = 0;
    let soundEnabled = false;
    let adSeenOrDismissed = false;

    document.querySelectorAll(".js-whatsapp").forEach(link => {
      link.href = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(WHATSAPP_MESSAGE)}`;
      link.addEventListener("click", () => {
        adSeenOrDismissed = true;
        timedAd.classList.remove("visible");
      });
    });

    reels.forEach((_, index) => {
      const dot = document.createElement("span");
      dot.className = "dot";
      if (index === 0) dot.classList.add("active");
      progress.appendChild(dot);
    });

    const dots = [...document.querySelectorAll(".dot")];

    function applyTheme(themeName) {
      // El fondo principal ahora es un video desktop + imagen base.
      // Mantenemos esta función para no romper el observer, pero no tapamos el video.
      ambient.dataset.theme = themeName;
    }

    function getActiveVideo() { return reels[activeIndex]?.querySelector("video") || null; }

    function updateAudioUI() {
      audioToggle.classList.toggle("is-on", soundEnabled);
      audioIcon.textContent = soundEnabled ? "🔊" : "🔇";
      audioText.textContent = "Audio";
    }

    function playActiveVideo() {
      videos.forEach(video => video.pause());
      const activeVideo = getActiveVideo();
      if (!activeVideo) return;
      activeVideo.muted = !soundEnabled;
      activeVideo.volume = soundEnabled ? 1 : 0;
      activeVideo.play().catch(() => {});
    }

    function setSound(enabled) {
      soundEnabled = enabled;
      videos.forEach(video => {
        video.muted = !enabled;
        video.volume = enabled ? 1 : 0;
      });
      updateAudioUI();
      playActiveVideo();
    }

    function dismissAd(showFloating = true) {
      adSeenOrDismissed = true;
      timedAd.classList.remove("visible");
      if (showFloating) floatingWhatsapp.classList.add("visible");
    }

    audioToggle.addEventListener("click", () => setSound(!soundEnabled));
    closeTimedAd.addEventListener("click", () => dismissAd(true));

    document.querySelectorAll(".js-like, .js-save").forEach(button => {
      button.addEventListener("click", () => button.classList.toggle("active"));
    });

    closeAd.addEventListener("click", () => {
      dismissAd(true);
      reels[reels.length - 2]?.scrollIntoView({ behavior: "smooth", block: "start" });
    });

    setTimeout(() => {
      const isOnAdReel = reels[activeIndex]?.classList.contains("ad-reel");
      if (!adSeenOrDismissed && !isOnAdReel) timedAd.classList.add("visible");
    }, TIMED_AD_DELAY_MS);

    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (!entry.isIntersecting) return;
        const index = reels.indexOf(entry.target);
        if (index < 0) return;
        activeIndex = index;
        dots.forEach((dot, dotIndex) => dot.classList.toggle("active", dotIndex === index));
        if (entry.target.classList.contains("ad-reel")) {
          adSeenOrDismissed = true;
          timedAd.classList.remove("visible");
        }
        applyTheme(entry.target.dataset.theme);
        playActiveVideo();
      });
    }, { root: screen, threshold: 0.62 });

    reels.forEach(reel => observer.observe(reel));
    applyTheme("manifesto");
    updateAudioUI();
    playActiveVideo();

    videos.forEach(video => {
      video.addEventListener("loadedmetadata", () => {
        if (video === getActiveVideo()) playActiveVideo();
      });
    });
  </script>
</body>
</html>
